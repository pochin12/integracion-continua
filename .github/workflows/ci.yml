name: Pipeline-IC-Actions

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  # =======================================
  # JOB 1: CONSTRUCCIÓN Y PRUEBAS
  # =======================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas unitarias
        run: pytest tests/ -v

  # =======================================
  # JOB 2: DESPLIEGUE EN DOCKER
  # =======================================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t integracion-continua .

      - name: Ejecutar contenedor
        run: docker run integracion-continua

      - name: Confirmar deploy exitoso
        run: echo "Deploy completado exitosamente"