name: Pipeline-IC-Actions

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  # =======================================
  # JOB 1: CONSTRUCCIÓN Y PRUEBAS
  # =======================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Inspección de código
        run: flake8 src/ --max-line-length=100

      - name: Ejecutar pruebas unitarias
        run: pytest tests/ -v

  # =======================================
  # JOB 2: DESPLIEGUE EN DOCKER
  # =======================================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t integracion-continua .

      - name: Ejecutar contenedor
        run: docker run integracion-continua

      - name: Confirmar deploy exitoso
        run: echo "Deploy completado exitosamente"

  # =======================================
  # JOB 3: NOTIFICACIÓN A DISCORD
  # =======================================
  notify:
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy]
    if: always()
    steps:
      - name: Notificar resultado en Discord
        run: |
          STATUS="${{ needs.deploy.result }}"
          if [ "$STATUS" = "success" ]; then
            COLOR=3066993
            EMOJI="✅"
            MSG="Pipeline completado exitosamente"
          else
            COLOR=15158332
            EMOJI="❌"
            MSG="Pipeline falló. Revisar el código."
          fi

          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"$EMOJI Pipeline-IC-Actions\",
              \"description\": \"$MSG\",
              \"color\": $COLOR,
              \"fields\": [
                {\"name\": \"Repositorio\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                {\"name\": \"Rama\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                {\"name\": \"Commit\", \"value\": \"${{ github.sha }}\", \"inline\": false}
              ]
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}