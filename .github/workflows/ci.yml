name: CI - Integración Continua y Entrega

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar el repositorio
        uses: actions/checkout@v3

      - name: 2. Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 3. Instalar dependencias
        run: pip install pytest

      - name: 4. Ejecutar pruebas automáticas
        run: pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: 1. Clonar el repositorio
        uses: actions/checkout@v3

      - name: 2. Construir imagen Docker
        run: docker build -t integracion-continua .

      - name: 3. Ejecutar contenedor
        run: docker run integracion-continua

      - name: 4. Confirmar deploy exitoso
        run: echo "Deploy completado exitosamente en entorno Docker"